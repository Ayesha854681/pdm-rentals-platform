<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rental Car Booking Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, textarea {
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #010745;
      border-radius: 4px;
      font-size: 16px;
    }
    input[type="submit"] {
      margin-top: 20px;
      background-color: #010745;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    input[type="submit"]:hover {
      background-color: #020a8c;
    }
    #dailyPrice, #totalCost {
      margin-top: 20px;
      font-weight: bold;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rental Car Booking Form</h1>
    <form id="rental-form" action="submit_booking.php" method="POST" enctype="multipart/form-data">
      <!-- Personal Information -->
      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" name="full_name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required />

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="4" required></textarea>

      <input type="text" name="car_name" />


      <!-- License Info -->
      <label for="license">Driver's License Number</label>
      <input type="text" id="license" name="license" required />

      <!-- ID Proof Upload -->
      <label for="id-proof">Upload ID Proof</label>
      <input type="file" id="id-proof" name="id_proof" accept="image/*,application/pdf" required />

      <!-- Rental Info -->
      <p id="dailyPrice">Daily Rate: </p>

      <label for="rental_days">Rental Days:</label>
      <input type="number" name="rental_days" id="rental_days" required />

      <p id="totalCost">Total Cost: </p>

      <!-- Hidden Fields -->
      <input type="hidden" name="category" id="category" />
      <input type="hidden" name="car_name" id="car_name" />
      <input type="hidden" name="daily_price" id="daily_price" />
      <input type="hidden" name="total_cost" id="total_cost" />

      <!-- Payment -->
      <label for="payment-method">Payment Method</label>
      <select id="payment-method" name="payment_method" required>
        <option value="">Select payment method</option>
        <option value="credit-card">Credit Card</option>
        <option value="debit-card">Debit Card</option>
        <option value="easypaisa">EasyPaisa</option>
        <option value="jazzcash">Jazz Cash</option>
      </select>

      <!-- Submit -->
      <input type="submit" value="Book Now" />
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const dailyPrice = parseFloat(urlParams.get('price')) || 0;
      const carName = urlParams.get('car') || '';
      const category = urlParams.get('category') || '';

      console.log("Full URL:", window.location.href);
      console.log("Category:", category);
      console.log("Car:", carName);

      const rentalDaysInput = document.getElementById('rental_days');
      const dailyPriceDisplay = document.getElementById('dailyPrice');
      const totalCostDisplay = document.getElementById('totalCost');

      const hiddenDailyPriceInput = document.getElementById('daily_price');
      const hiddenTotalCostInput = document.getElementById('total_cost');
      const hiddenCarNameInput = document.getElementById('car_name');
      const hiddenCategoryInput = document.getElementById('category');

      // Set initial values
      dailyPriceDisplay.textContent = `Daily Rate: ${dailyPrice} Rs/day`;
      hiddenDailyPriceInput.value = dailyPrice;
      hiddenCarNameInput.value = carName;
      hiddenCategoryInput.value = category;

      const calculateTotal = () => {
        const days = parseInt(rentalDaysInput.value);
        const total = isNaN(days) ? 0 : dailyPrice * days;
        totalCostDisplay.textContent = `Total Cost: ${total} Rs`;
        hiddenTotalCostInput.value = total;
      };

      rentalDaysInput.addEventListener('input', calculateTotal);
      calculateTotal();
    });
  </script>
</body>
</html>
