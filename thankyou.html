<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #d0e3ff, #f8faff);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .thankyou-container {
            background-color: #ffffff;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 520px;
            border-top: 8px solid #010745;
            animation: slideFade 0.6s ease-out;
        }

        @keyframes slideFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .thankyou-container .icon {
            font-size: 64px;
            color: #00c897;
            margin-bottom: 25px;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .thankyou-container h1 {
            color: #010745;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .thankyou-container p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 35px;
        }

        .thankyou-container a {
            padding: 12px 32px;
            background-color: #010745;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .thankyou-container a:hover {
            background-color: #1a2b91;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="thankyou-container">
    <div class="icon">🎉</div>
    <h1>Booking Successful!</h1>
    <p>We truly appreciate your booking. All your rental details have been recorded.</p>
    <a href="index.html">Return to Home</a>
</div>

</body>
</html>
