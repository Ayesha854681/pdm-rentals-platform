<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Your Cart</h1>
        </header>

        <div id="cart">
            <ul id="cart-items"></ul>
            <div class="total">
                <strong>Total:</strong> <span id="total-price">0</span> /day
            </div>
        </div>

        <footer>
            <a href="index.html" class="view-cart-btn">Continue Shopping</a>
            <button id="empty-cart" style="background-color: rgb(163, 20, 20); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Empty Cart</button>
            <button id="proceed-to-checkout" style="background-color:#010745;color:white;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;">Proceed To Checkout</button>
        </footer>
    </div>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

.container {
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 20px;
    background-color: #010745;
    padding: 10px;
    border-bottom: 2px solid #ccc;
    color: #fff;
}

header h1 {
    margin: 0;
    font-size: 2em;
}

#cart {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background-color: #fff;
}

#cart-items {
    list-style: none;
    padding: 0;
    margin: 0;
}

#cart-items li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #ccc;
}

#cart-items img {
    width: 50px;
    height: auto;
    margin-right: 10px;
}

#cart-items span {
    flex: 1;
    text-align: left;
}

.total {
    text-align: right;
    margin-top: 20px;
    font-size: 1.5em;
    font-weight: bold;
    color: #333;
}

footer {
    text-align: center;
    margin-top: 20px;
}

footer a, footer button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #010745;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 1em;
    border: none;
    cursor: pointer;
    margin: 5px;
}

footer a:hover, footer button:hover {
    background-color: #132b83;
}

@media (max-width: 768px) {
    #cart {
        padding: 10px;
    }

    #cart-items li {
        flex-wrap: wrap;
    }

    #cart-items img {
        margin-bottom: 10px;
    }

    footer a, footer button {
        font-size: 0.9em;
        padding: 8px 16px;
    }
}
    </style>

   <script>
function saveCartToDatabase(cart) {
    fetch("/websitedb/save_cart.php", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
    },
    body: JSON.stringify(cart)
})

    .then(res => res.json())
    .then(response => {
        if (response.status === "success") {
            console.log("✅ Cart saved to database:", response);
            // Redirect with total
            window.location.href = `form.html?price=${calculateTotal(cart)}`;
        } else {
            console.error("❌ Server error:", response.message);
            alert("Server Error: " + response.message);
        }
    })
    .catch(error => {
        console.error("❌ Network error:", error);
        alert("Failed to save cart. Network or server issue.");
    });
}

function calculateTotal(cart) {
    return cart.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
}

document.addEventListener('DOMContentLoaded', () => {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartList = document.getElementById('cart-items');
    const totalPriceElement = document.getElementById('total-price');
    const proceedBtn = document.getElementById('proceed-to-checkout');
    const emptyBtn = document.getElementById('empty-cart');

    let total = 0;

    // Render cart items
    cart.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
            <img src="${item.img}" alt="${item.name}" style="width: 50px; margin-right: 10px;">
            <span>${item.name}</span>  
            <span style="text-align: right;">RS ${item.price}/day</span>
        `;
        cartList.appendChild(li);
        total += parseFloat(item.price || 0);
    });

    totalPriceElement.textContent = total;

    if (cart.length === 0) {
        cartList.innerHTML = '<li>Your cart is empty.</li>';
    }

    // Empty cart
    emptyBtn.addEventListener('click', () => {
        localStorage.removeItem('cart');
        cartList.innerHTML = '<li>Your cart is empty.</li>';
        totalPriceElement.textContent = 0;
    });

    // Save & proceed
    proceedBtn.addEventListener('click', () => {
        if (cart.length === 0) {
            alert("Cart is empty.");
        } else {
            saveCartToDatabase(cart);
        }
    });
});
</script>

</body>
</html>
